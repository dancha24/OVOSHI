# Режим разработки: весь backend/frontend с хоста → контейнер; Django runserver и Vite перезагружаются сами.
# Запуск из папки docker:
#   .\dev.ps1 up -d --build
#   .\dev.ps1 -Gateway up -d --build   # + gateway 59728 и env домена (флаг не -Domain — конфликт с docker compose up -d)
# Вручную: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Callback API бота ВК: укажи в сообществе URL своего HTTPS (домен / nginx) → …/vk/callback/
# DJANGO_ALLOW_ALL_HOSTS=1 в compose ниже — чтобы не ловить 400, если Host не localhost (тесты с внешним хостом).

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ../backend:/app
      - backend_static:/app/staticfiles
      - ../backend/media:/app/media
    environment:
      DEBUG: "1"
      DJANGO_ALLOW_ALL_HOSTS: "1"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    environment:
      # Windows: иначе Vite в контейнере не видит сохранения файлов с хоста (bind mount).
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  backend_static: {}
  frontend_node_modules: {}
