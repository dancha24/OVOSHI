# Единая точка входа для NPM: прокси на этот контейнер :80 (снаружи хоста — см. compose, обычно 59728).
# /vk/*, /api/*, /accounts/*, /static/*, /media/* → Django
# /admin/* — только Django admin (если NPM вешает домен на бэкенд :59722, так и должно быть).
# Кабинет лидера React: /leader/* — без конфликта с Django.
# / и /leader/ → frontend (nginx со статикой или Vite в dev)
# Docker DNS: без resolver nginx запоминает IP backend/frontend при старте — после recreate контейнера 502.
#
# NPM перед HTTPS обычно шлёт X-Forwarded-Proto: https. Не затираем её $scheme (у нас до gateway часто http),
# иначе Django не видит HTTPS и cookie/CSRF ведут себя неправильно.

map $http_x_forwarded_proto $ovoshi_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 50M;

    location /vk/ {
        set $ovoshi_backend backend;
        proxy_pass http://$ovoshi_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ovoshi_forwarded_proto;
        proxy_read_timeout 120s;
    }

    location /api/ {
        set $ovoshi_backend backend;
        proxy_pass http://$ovoshi_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ovoshi_forwarded_proto;
    }

    location /leader/ {
        set $ovoshi_frontend frontend;
        proxy_pass http://$ovoshi_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ovoshi_forwarded_proto;
    }

    location /admin/ {
        set $ovoshi_backend backend;
        proxy_pass http://$ovoshi_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ovoshi_forwarded_proto;
    }

    location /accounts/ {
        set $ovoshi_backend backend;
        proxy_pass http://$ovoshi_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ovoshi_forwarded_proto;
    }

    location /static/ {
        set $ovoshi_backend backend;
        proxy_pass http://$ovoshi_backend:8000;
        proxy_set_header Host $host;
    }

    location /media/ {
        set $ovoshi_backend backend;
        proxy_pass http://$ovoshi_backend:8000;
        proxy_set_header Host $host;
    }

    location / {
        set $ovoshi_frontend frontend;
        proxy_pass http://$ovoshi_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ovoshi_forwarded_proto;
    }
}
