server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Старый index.html тянет старые ссылки на JS — после обновления образа без этого виден устаревший UI.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Bootstrap и прочая статика из public/ (vite копирует в dist/css/). Явный try_files — иначе при отсутствии
    # файла запрос уходит в location / и отдаётся index.html (кажется «редиректом на корень»).
    location ^~ /css/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
